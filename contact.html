<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact - Dhyana Yoga</title>

<style>
/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* Navbar */
nav{
    background:#7198AF;
    padding:15px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-size:18px;
}

.logo{
    color:white;
    font-weight:bold;
    font-size:24px;
}

/* Hero Section */
.hero{
    height:60vh; /* Increased height */
    background:url('https://images.pexels.com/photos/4534604/pexels-photo-4534604.jpeg') no-repeat center/cover;
    background-size: cover;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.hero h1{
    color:white;
    font-size:50px;
    background:rgba(0,0,0,0.5);
    padding:20px 30px;
    border-radius:15px;
    text-align:center;
}

/* Contact Form Section */
.contact-section{
    padding:60px 100px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.contact-section h2{
    color:#7198AF;
    margin-bottom:20px;
}

.contact-form{
    width:100%;
    max-width:500px;
    display:flex;
    flex-direction:column;
}

.contact-form input,
.contact-form textarea{
    padding:12px;
    margin-bottom:20px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    resize:none;
}

.contact-form button{
    padding:12px;
    border:none;
    border-radius:25px;
    background:#7198AF;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.contact-form button:hover{
    background:#5b7b9c;
}

/* Footer */
footer{
    background:#153a50;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
/* 📱 Mobile Responsive */
@media (max-width:768px){

    /* Navbar */
    nav{
        flex-direction:column;
        padding:10px;
        text-align:center;
    }

    .nav-links{
        margin-top:10px;
    }

    .nav-links a{
        display:block;
        margin:8px 0;
        font-size:16px;
    }

    /* Hero Text */
    .hero h1{
        font-size:28px;
        padding:10px 15px;
    }

    /* Sections Padding */
    .container,
    .contact-section,
    .story{
        padding:30px 20px;
    }

    /* Cards (Services Page) */
    .container{
        flex-direction:column;
        align-items:center;
    }

    .card{
        width:90%;
    }

    /* Images */
    img{
        width:100%;
        height:auto;
    }

    /* Mission Section */
    .mission{
        flex-direction:column;
        gap:20px;
    }

    .box{
        width:90%;
    }

    /* Form */
    .contact-form{
        width:100%;
    }

    /* Button */
    button{
        width:100%;
    }
}

</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <div class="logo">DHYANA YOGA</div>
    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="service.html">Services</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<!-- Hero Section -->
<div class="hero">
    <h1>Contact Us</h1>
</div>

<!-- Contact Form Section -->
<section class="contact-section">
    <h2>Get In Touch</h2>
    <form class="contact-form">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="5" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</section>

<!-- Footer -->
<footer>
    &copy; 2026 Dhyana Yoga. All Rights Reserved.
</footer>

</body>
</html>
