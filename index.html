<!DOCTYPE html>

    <style>
        * {
            margin: 0;

        .content h1 {
    font-size: 60px;

}

.content p {

.content button {

        /* Navbar */

            display: flex;

        }

            margin-left: 20px;
            cursor: pointer;
        }

        .hero {

        }

        .content button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: white;
            color: black;
            cursor: pointer;
            font-size: 16px;

        }
        /* Navbar background color */
nav {

/* Navbar text (Home, About, Services, Contact) */

button {
